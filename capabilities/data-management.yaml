  exposes:
  - type: rest
    port: 8080
    namespace: snowflake-data-mgmt-api
    description: Unified REST API for Snowflake data structure management.
    resources:
    - path: /v1/databases
      name: databases
      description: Database management
      operations:
      - method: GET
        name: list-databases
        description: List all databases
        call: snowflake-database.list-databases
        inputParameters:
        - name: like
          in: query
          type: string
          required: false
          description: Filter by name pattern
          mapping: snowflake-database.list-databases.like
        outputParameters:
        - name: databases
          type: array
          description: Array of database objects
          mapping: $.
      - method: POST
        name: create-database
        description: Create a database
        call: snowflake-database.create-database
        inputParameters:
        - name: name
          in: body
          type: string
          required: true
          description: Database name to create
          mapping: snowflake-database.create-database.name
        outputParameters:
        - name: result
          type: object
          description: Created database metadata
          mapping: $.
    - path: /v1/databases/{name}
      name: database
      description: Single database operations
      operations:
      - method: GET
        name: fetch-database
        description: Fetch a database
        call: snowflake-database.fetch-database
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Database name
          mapping: snowflake-database.fetch-database.name
        outputParameters:
        - name: result
          type: object
          description: Database metadata
          mapping: $.
      - method: DELETE
        name: delete-database
        description: Delete a database
        call: snowflake-database.delete-database
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Database name
          mapping: snowflake-database.delete-database.name
        outputParameters:
        - name: result
          type: object
          description: Delete status
          mapping: $.
    - path: /v1/schemas
      name: schemas
      description: Schema management
      operations:
      - method: GET
        name: list-schemas
        description: List schemas
        call: snowflake-schema.list-schemas
        inputParameters:
        - name: database
          in: query
          type: string
          required: true
          description: Database to list schemas from
          mapping: snowflake-schema.list-schemas.database
        - name: like
          in: query
          type: string
          required: false
          description: Filter by name pattern
          mapping: snowflake-schema.list-schemas.like
        outputParameters:
        - name: schemas
          type: array
          description: Array of schema objects
          mapping: $.
      - method: POST
        name: create-schema
        description: Create a schema
        call: snowflake-schema.create-schema
        inputParameters:
        - name: database
          in: body
          type: string
          required: true
          description: Database name
          mapping: snowflake-schema.create-schema.database
        - name: name
          in: body
          type: string
          required: true
          description: Schema name
          mapping: snowflake-schema.create-schema.name
        outputParameters:
        - name: result
          type: object
          description: Created schema metadata
          mapping: $.
    - path: /v1/tables
      name: tables
      description: Table management
      operations:
      - method: GET
        name: list-tables
        description: List tables
        call: snowflake-table.list-tables
        inputParameters:
        - name: database
          in: query
          type: string
          required: true
          description: Database name
          mapping: snowflake-table.list-tables.database
        - name: schema
          in: query
          type: string
          required: true
          description: Schema name
          mapping: snowflake-table.list-tables.schema
        outputParameters:
        - name: tables
          type: array
          description: Array of table objects
          mapping: $.
      - method: POST
        name: create-table
        description: Create a table
        call: snowflake-table.create-table
        inputParameters:
        - name: database
          in: body
          type: string
          required: true
          description: Database name
          mapping: snowflake-table.create-table.database
        - name: schema
          in: body
          type: string
          required: true
          description: Schema name
          mapping: snowflake-table.create-table.schema
        - name: name
          in: body
          type: string
          required: true
          description: Table name
          mapping: snowflake-table.create-table.name
        outputParameters:
        - name: result
          type: object
          description: Created table metadata
          mapping: $.
    - path: /v1/views
      name: views
      description: View management
      operations:
      - method: GET
        name: list-views
        description: List views
        call: snowflake-view.list-views
        inputParameters:
        - name: database
          in: query
          type: string
          required: true
          description: Database name
          mapping: snowflake-view.list-views.database
        - name: schema
          in: query
          type: string
          required: true
          description: Schema name
          mapping: snowflake-view.list-views.schema
        outputParameters:
        - name: views
          type: array
          description: Array of view objects
          mapping: $.
      - method: POST
        name: create-view
        description: Create a view
        call: snowflake-view.create-view
        inputParameters:
        - name: database
          in: body
          type: string
          required: true
          description: Database name
          mapping: snowflake-view.create-view.database
        - name: schema
          in: body
          type: string
          required: true
          description: Schema name
          mapping: snowflake-view.create-view.schema
        - name: name
          in: body
          type: string
          required: true
          description: View name
          mapping: snowflake-view.create-view.name
        outputParameters:
        - name: result
          type: object
          description: Created view metadata
          mapping: $.
    - path: /v1/dynamic-tables
      name: dynamic-tables
      description: Dynamic table management
      operations:
      - method: GET
        name: list-dynamic-tables
        description: List dynamic tables
        call: snowflake-dynamic-table.list-dynamic-tables
        inputParameters:
        - name: database
          in: query
          type: string
          required: true
          description: Database name
          mapping: snowflake-dynamic-table.list-dynamic-tables.database
        - name: schema
          in: query
          type: string
          required: true
          description: Schema name
          mapping: snowflake-dynamic-table.list-dynamic-tables.schema
        outputParameters:
        - name: dynamicTables
          type: array
          description: Array of dynamic table objects
          mapping: $.
      - method: POST
        name: create-dynamic-table
        description: Create a dynamic table
        call: snowflake-dynamic-table.create-dynamic-table
        inputParameters:
        - name: database
          in: body
          type: string
          required: true
          description: Database name
          mapping: snowflake-dynamic-table.create-dynamic-table.database
        - name: schema
          in: body
          type: string
          required: true
          description: Schema name
          mapping: snowflake-dynamic-table.create-dynamic-table.schema
        - name: name
          in: body
          type: string
          required: true
          description: Dynamic table name
          mapping: snowflake-dynamic-table.create-dynamic-table.name
        outputParameters:
        - name: result
          type: object
          description: Created dynamic table metadata
          mapping: $.
    - path: /v1/iceberg-tables
      name: iceberg-tables
      description: Iceberg table management
      operations:
      - method: GET
        name: list-iceberg-tables
        description: List Iceberg tables
        call: snowflake-iceberg-table.list-iceberg-tables
        inputParameters:
        - name: database
          in: query
          type: string
          required: true
          description: Database name
          mapping: snowflake-iceberg-table.list-iceberg-tables.database
        - name: schema
          in: query
          type: string
          required: true
          description: Schema name
          mapping: snowflake-iceberg-table.list-iceberg-tables.schema
        outputParameters:
        - name: icebergTables
          type: array
          description: Array of Iceberg table objects
          mapping: $.
      - method: POST
        name: create-iceberg-table
        description: Create an Iceberg table
        call: snowflake-iceberg-table.create-iceberg-table
        inputParameters:
        - name: database
          in: body
          type: string
          required: true
          description: Database name
          mapping: snowflake-iceberg-table.create-iceberg-table.database
        - name: schema
          in: body
          type: string
          required: true
          description: Schema name
          mapping: snowflake-iceberg-table.create-iceberg-table.schema
        - name: name
          in: body
          type: string
          required: true
          description: Iceberg table name
          mapping: snowflake-iceberg-table.create-iceberg-table.name
        outputParameters:
        - name: result
          type: object
          description: Created Iceberg table metadata
          mapping: $.
  - type: mcp
    port: 9080
    namespace: snowflake-data-mgmt-mcp
    transport: http
    description: MCP server (HTTP transport) for AI-assisted Snowflake data structure management.
    tools:
    - name: list-databases
      description: List all accessible databases
      call: snowflake-database.list-databases
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      inputParameters:
      - name: like
        type: string
        required: false
        description: Filter by name pattern
        mapping: snowflake-database.list-databases.like
      outputParameters:
      - name: databases
        type: array
        description: Array of database objects
        mapping: $.
    - name: create-database
      description: Create a new database
      call: snowflake-database.create-database
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      inputParameters:
      - name: name
        type: string
        required: true
        description: Database name to create
        mapping: snowflake-database.create-database.name
      outputParameters:
      - name: result
        type: object
        description: Created database metadata
        mapping: $.
    - name: fetch-database
      description: Fetch database details by name
