# Naftiko Snowflake Data Management capability.
# Composes eight shared Snowflake sub-capabilities (database, schema, table,
# view, dynamic-table, iceberg-table, event-table, external-volume) and
# exposes them through a triple adapter surface: REST for conventional
# clients, MCP (HTTP + stdio transports) for AI agents, and Agent Skills
# for skill-aware AI clients. Input and output parameters use typed
# JSONPath mappings so payloads are task-ready for both humans and agents.
naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Data Management"
  description: "Unified workflow for managing databases, schemas, tables, views, dynamic tables, iceberg tables, and event tables. Used by Data Engineers and Database Administrators to create, organize, and maintain data structures."
  tags:
    - Snowflake
    - Data Management
    - Data Engineering
  created: "2026-04-18"
  modified: "2026-04-23"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - import: snowflake-database
      location: ./shared/database.yaml
    - import: snowflake-schema
      location: ./shared/schema.yaml
    - import: snowflake-table
      location: ./shared/table.yaml
    - import: snowflake-view
      location: ./shared/view.yaml
    - import: snowflake-dynamic-table
      location: ./shared/dynamic-table.yaml
    - import: snowflake-iceberg-table
      location: ./shared/iceberg-table.yaml
    - import: snowflake-event-table
      location: ./shared/event-table.yaml
    - import: snowflake-external-volume
      location: ./shared/external-volume.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: snowflake-data-mgmt-api
      description: "Unified REST API for Snowflake data structure management."
      resources:
        - path: /v1/databases
          name: databases
          description: "Database management"
          operations:
            - method: GET
              name: list-databases
              description: "List all databases"
              call: "snowflake-database.list-databases"
              inputParameters:
                - name: like
                  in: query
                  type: string
                  required: false
                  description: "Filter by name pattern"
                  mapping: "snowflake-database.list-databases.like"
              outputParameters:
                - name: databases
                  type: array
                  description: "Array of database objects"
                  mapping: "$."
            - method: POST
              name: create-database
              description: "Create a database"
              call: "snowflake-database.create-database"
              inputParameters:
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Database name to create"
                  mapping: "snowflake-database.create-database.name"
              outputParameters:
                - name: result
                  type: object
                  description: "Created database metadata"
                  mapping: "$."
        - path: /v1/databases/{name}
          name: database
          description: "Single database operations"
          operations:
            - method: GET
              name: fetch-database
              description: "Fetch a database"
              call: "snowflake-database.fetch-database"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Database name"
                  mapping: "snowflake-database.fetch-database.name"
              outputParameters:
                - name: result
                  type: object
                  description: "Database metadata"
                  mapping: "$."
            - method: DELETE
              name: delete-database
              description: "Delete a database"
              call: "snowflake-database.delete-database"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Database name"
                  mapping: "snowflake-database.delete-database.name"
              outputParameters:
                - name: result
                  type: object
                  description: "Delete status"
                  mapping: "$."
        - path: /v1/schemas
          name: schemas
          description: "Schema management"
          operations:
            - method: GET
              name: list-schemas
              description: "List schemas"
              call: "snowflake-schema.list-schemas"
              inputParameters:
                - name: database
                  in: query
                  type: string
                  required: true
                  description: "Database to list schemas from"
                  mapping: "snowflake-schema.list-schemas.database"
                - name: like
                  in: query
                  type: string
                  required: false
                  description: "Filter by name pattern"
                  mapping: "snowflake-schema.list-schemas.like"
              outputParameters:
                - name: schemas
                  type: array
                  description: "Array of schema objects"
                  mapping: "$."
            - method: POST
              name: create-schema
              description: "Create a schema"
              call: "snowflake-schema.create-schema"
              inputParameters:
                - name: database
                  in: body
                  type: string
                  required: true
                  description: "Database name"
                  mapping: "snowflake-schema.create-schema.database"
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Schema name"
                  mapping: "snowflake-schema.create-schema.name"
              outputParameters:
                - name: result
                  type: object
                  description: "Created schema metadata"
                  mapping: "$."
        - path: /v1/tables
          name: tables
          description: "Table management"
          operations:
            - method: GET
              name: list-tables
              description: "List tables"
              call: "snowflake-table.list-tables"
              inputParameters:
                - name: database
                  in: query
                  type: string
                  required: true
                  description: "Database name"
                  mapping: "snowflake-table.list-tables.database"
                - name: schema
                  in: query
                  type: string
                  required: true
                  description: "Schema name"
                  mapping: "snowflake-table.list-tables.schema"
              outputParameters:
                - name: tables
                  type: array
                  description: "Array of table objects"
                  mapping: "$."
            - method: POST
              name: create-table
              description: "Create a table"
              call: "snowflake-table.create-table"
              inputParameters:
                - name: database
                  in: body
                  type: string
                  required: true
                  description: "Database name"
                  mapping: "snowflake-table.create-table.database"
                - name: schema
                  in: body
                  type: string
                  required: true
                  description: "Schema name"
                  mapping: "snowflake-table.create-table.schema"
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Table name"
                  mapping: "snowflake-table.create-table.name"
              outputParameters:
                - name: result
                  type: object
                  description: "Created table metadata"
                  mapping: "$."
        - path: /v1/views
          name: views
          description: "View management"
          operations:
            - method: GET
              name: list-views
              description: "List views"
              call: "snowflake-view.list-views"
              inputParameters:
                - name: database
                  in: query
                  type: string
                  required: true
                  description: "Database name"
                  mapping: "snowflake-view.list-views.database"
                - name: schema
                  in: query
                  type: string
                  required: true
                  description: "Schema name"
                  mapping: "snowflake-view.list-views.schema"
              outputParameters:
                - name: views
                  type: array
                  description: "Array of view objects"
                  mapping: "$."
            - method: POST
              name: create-view
              description: "Create a view"
              call: "snowflake-view.create-view"
              inputParameters:
                - name: database
                  in: body
                  type: string
                  required: true
                  description: "Database name"
                  mapping: "snowflake-view.create-view.database"
                - name: schema
                  in: body
                  type: string
                  required: true
                  description: "Schema name"
                  mapping: "snowflake-view.create-view.schema"
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "View name"
                  mapping: "snowflake-view.create-view.name"
              outputParameters:
                - name: result
                  type: object
                  description: "Created view metadata"
                  mapping: "$."
        - path: /v1/dynamic-tables
          name: dynamic-tables
          description: "Dynamic table management"
          operations:
            - method: GET
              name: list-dynamic-tables
              description: "List dynamic tables"
              call: "snowflake-dynamic-table.list-dynamic-tables"
              inputParameters:
                - name: database
                  in: query
                  type: string
                  required: true
                  description: "Database name"
                  mapping: "snowflake-dynamic-table.list-dynamic-tables.database"
                - name: schema
                  in: query
                  type: string
                  required: true
                  description: "Schema name"
                  mapping: "snowflake-dynamic-table.list-dynamic-tables.schema"
              outputParameters:
                - name: dynamicTables
                  type: array
                  description: "Array of dynamic table objects"
                  mapping: "$."
            - method: POST
              name: create-dynamic-table
              description: "Create a dynamic table"
              call: "snowflake-dynamic-table.create-dynamic-table"
              inputParameters:
                - name: database
                  in: body
                  type: string
                  required: true
                  description: "Database name"
                  mapping: "snowflake-dynamic-table.create-dynamic-table.database"
                - name: schema
                  in: body
                  type: string
                  required: true
                  description: "Schema name"
                  mapping: "snowflake-dynamic-table.create-dynamic-table.schema"
                - name: name
                  in: body
                  type: string
                  required: true
                  description: "Dynamic table name"
                  mapping: "snowflake-dynamic-table.create-dynamic-table.name"
              outputParameters:
                - name: result
                  type: object
                  description: "Created dynamic table metadata"
                  mapping: "$."
        - path: /v1/iceberg-tables
          name: iceberg-tables
          description: "Iceberg table management"
          operations:
            - method: GET
              name: list-iceberg-tables
              description: "List Iceberg tables"
              call: "snowflake-iceberg-table.list-iceberg-tables"
              inputParameters:
