            readOnly: false
            destructive: false
            idempotent: false
          inputParameters:
            - name: name
              type: string
              required: true
              description: "Source database name"
              mapping: "snowflake-database.clone-database.name"
          outputParameters:
            - name: result
              type: object
              description: "Cloned database metadata"
              mapping: "$."
        - name: undrop-database
          description: "Restore a dropped database"
          call: "snowflake-database.undrop-database"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          inputParameters:
            - name: name
              type: string
              required: true
              description: "Database name"
              mapping: "snowflake-database.undrop-database.name"
          outputParameters:
            - name: result
              type: object
              description: "Restore status"
              mapping: "$."
        - name: list-schemas
          description: "List schemas in a database"
          call: "snowflake-schema.list-schemas"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: database
              type: string
              required: true
              description: "Database name"
              mapping: "snowflake-schema.list-schemas.database"
            - name: like
              type: string
              required: false
              description: "Filter by name pattern"
              mapping: "snowflake-schema.list-schemas.like"
          outputParameters:
            - name: schemas
              type: array
              description: "Array of schema objects"
              mapping: "$."
        - name: create-schema
          description: "Create a new schema"
          call: "snowflake-schema.create-schema"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          inputParameters:
            - name: database
              type: string
              required: true
              description: "Database name"
              mapping: "snowflake-schema.create-schema.database"
            - name: name
              type: string
              required: true
              description: "Schema name"
              mapping: "snowflake-schema.create-schema.name"
          outputParameters:
            - name: result
              type: object
              description: "Created schema metadata"
              mapping: "$."
        - name: fetch-schema
          description: "Fetch schema details"
          call: "snowflake-schema.fetch-schema"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          inputParameters:
            - name: database
              type: string
              required: true
              description: "Database name"
              mapping: "snowflake-schema.fetch-schema.database"
            - name: name
              type: string
              required: true
              description: "Schema name"
