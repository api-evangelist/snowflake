naftiko: 1.0.0-alpha2
info:
  label: Snowflake Data Management
  description: Unified workflow for managing databases, schemas, tables, views, dynamic tables, iceberg tables, and event
    tables. Used by Data Engineers and Database Administrators to create, organize, and maintain data structures.
  tags:
  - Snowflake
  - Data Management
  - Data Engineering
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
    SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN
capability:
  consumes:
  - type: http
    namespace: snowflake-database
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Database API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: databases
      path: /api/v2/databases
      description: Database resources
      operations:
      - name: list-databases
        method: GET
        description: List accessible databases
        inputParameters:
        - name: like
          in: query
          type: string
          required: false
          description: Filter by name pattern
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-database
        method: POST
        description: Create a new database
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
      - name: fetch-database
        method: GET
        description: Fetch a database by name
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Database name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-database
        method: DELETE
        description: Delete a database
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Database name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: clone-database
        method: POST
        description: Clone a database
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Source database name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: undrop-database
        method: POST
        description: Undrop a deleted database
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Database name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: enable-database-replication
        method: POST
        description: Enable replication for a database
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Database name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: disable-database-replication
        method: POST
        description: Disable replication for a database
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Database name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: enable-database-failover
        method: POST
        description: Enable failover for a database
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Database name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-schema
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Schema API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: schemas
      path: /api/v2/databases/{database}/schemas
      description: Schema resources
      operations:
      - name: list-schemas
        method: GET
        description: List schemas in a database
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
          description: Database name
        - name: like
          in: query
          type: string
          required: false
          description: Filter by name pattern
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-schema
        method: POST
        description: Create a new schema
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
          description: Database name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
      - name: fetch-schema
        method: GET
        description: Fetch a schema by name
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
          description: Database name
        - name: name
          in: path
          type: string
          required: true
          description: Schema name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-schema
        method: DELETE
        description: Delete a schema
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
          description: Database name
        - name: name
          in: path
          type: string
          required: true
          description: Schema name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: clone-schema
        method: POST
        description: Clone a schema
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
          description: Database name
        - name: name
          in: path
          type: string
          required: true
          description: Schema name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: undrop-schema
        method: POST
        description: Undrop a deleted schema
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
          description: Database name
        - name: name
          in: path
          type: string
          required: true
          description: Schema name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-table
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Table API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: tables
      path: /api/v2/databases/{database}/schemas/{schema}/tables
      description: Table resources
      operations:
      - name: list-tables
        method: GET
        description: List tables in a schema
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
          description: Database name
        - name: schema
          in: path
          type: string
          required: true
          description: Schema name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-table
        method: POST
        description: Create a new table
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
          description: Database name
        - name: schema
          in: path
          type: string
          required: true
          description: Schema name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
      - name: fetch-table
        method: GET
        description: Fetch a table by name
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
          description: Database name
        - name: schema
          in: path
          type: string
          required: true
          description: Schema name
        - name: name
          in: path
          type: string
          required: true
          description: Table name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-table
        method: DELETE
        description: Delete a table
        inputParameters:
        - name: database
          in: path
          type: string
          required: true
          description: Database name
        - name: schema
          in: path
          type: string
          required: true
          description: Schema name
        - name: name
          in: path
          type: string
          required: true
          description: Table name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: clone-table
        method: POST
        description: Clone a table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: undrop-table
        method: POST
        description: Undrop a deleted table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-view
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake View API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: views
      path: /api/v2/databases/{database}/schemas/{schema}/views
      description: View resources
      operations:
      - name: list-views
        method: GET
        description: List views in a schema
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-view
        method: POST
        description: Create a new view
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-view
        method: GET
        description: Fetch a view by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-view
        method: DELETE
        description: Delete a view
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-dynamic-table
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Dynamic Table API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: dynamic-tables
      path: /api/v2/databases/{database}/schemas/{schema}/dynamic-tables
      description: Dynamic table resources
      operations:
      - name: list-dynamic-tables
        method: GET
        description: List dynamic tables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-dynamic-table
        method: POST
        description: Create a dynamic table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-dynamic-table
        method: GET
        description: Fetch a dynamic table by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-dynamic-table
        method: DELETE
        description: Delete a dynamic table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: suspend-dynamic-table
        method: POST
        description: Suspend a dynamic table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: resume-dynamic-table
        method: POST
        description: Resume a dynamic table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: refresh-dynamic-table
        method: POST
        description: Refresh a dynamic table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-iceberg-table
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Iceberg Table API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: iceberg-tables
      path: /api/v2/databases/{database}/schemas/{schema}/iceberg-tables
      description: Iceberg table resources
      operations:
      - name: list-iceberg-tables
        method: GET
        description: List Iceberg tables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-iceberg-table
        method: POST
        description: Create a managed Iceberg table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-iceberg-table
        method: GET
        description: Fetch an Iceberg table by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: drop-iceberg-table
        method: DELETE
        description: Drop an Iceberg table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: refresh-iceberg-table
        method: POST
        description: Refresh an Iceberg table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-event-table
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Event Table API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: event-tables
      path: /api/v2/databases/{database}/schemas/{schema}/event-tables
      description: Event table resources
      operations:
      - name: list-event-tables
        method: GET
        description: List event tables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-event-table
        method: POST
        description: Create an event table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-event-table
        method: GET
        description: Fetch an event table by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-event-table
        method: DELETE
        description: Delete an event table
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-external-volume
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake External Volume API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: external-volumes
      path: /api/v2/external-volumes
      description: External volume resources
      operations:
      - name: list-external-volumes
        method: GET
        description: List external volumes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-external-volume
        method: POST
        description: Create an external volume
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-external-volume
        method: GET
        description: Fetch an external volume by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-external-volume
        method: DELETE
        description: Delete an external volume
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
