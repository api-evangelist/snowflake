naftiko: 1.0.0-alpha2
info:
  label: Snowflake View API — view
  description: 'Snowflake View API — view. 4 operations. Lead operation: List Views. Self-contained Naftiko capability covering
    one Snowflake business surface.'
  tags:
  - Snowflake
  - view
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SNOWFLAKE_API_KEY: SNOWFLAKE_API_KEY
capability:
  consumes:
  - type: http
    namespace: view-view
    baseUri: https://org-account.snowflakecomputing.com
    description: Snowflake View API — view business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-databases-database-schemas-schema-views
      path: /api/v2/databases/{database}/schemas/{schema}/views
      operations:
      - name: listviews
        method: GET
        description: List Views
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: deep
          in: query
          type: boolean
          description: Optionally includes dependency information of the view.
      - name: createview
        method: POST
        description: Create a View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-databases-database-schemas-schema-views-name
      path: /api/v2/databases/{database}/schemas/{schema}/views/{name}
      operations:
      - name: fetchview
        method: GET
        description: Fetch a View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteview
        method: DELETE
        description: Delete a View
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: view-view-rest
    port: 8080
    description: REST adapter for Snowflake View API — view. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/databases/{database}/schemas/{schema}/views
      name: api-v2-databases-database-schemas-schema-views
      description: REST surface for api-v2-databases-database-schemas-schema-views.
      operations:
      - method: GET
        name: listviews
        description: List Views
        call: view-view.listviews
        with:
          deep: rest.deep
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createview
        description: Create a View
        call: view-view.createview
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/databases/{database}/schemas/{schema}/views/{name}
      name: api-v2-databases-database-schemas-schema-views-name
      description: REST surface for api-v2-databases-database-schemas-schema-views-name.
      operations:
      - method: GET
        name: fetchview
        description: Fetch a View
        call: view-view.fetchview
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteview
        description: Delete a View
        call: view-view.deleteview
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: view-view-mcp
    port: 9090
    transport: http
    description: MCP adapter for Snowflake View API — view. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-views
      description: List Views
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: view-view.listviews
      with:
        deep: tools.deep
      outputParameters:
      - type: object
        mapping: $.
    - name: create-view
      description: Create a View
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: view-view.createview
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fetch-view
      description: Fetch a View
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: view-view.fetchview
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-view
      description: Delete a View
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: view-view.deleteview
      outputParameters:
      - type: object
        mapping: $.
