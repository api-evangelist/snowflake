naftiko: 1.0.0-alpha2
info:
  label: Snowflake Task API — task
  description: 'Snowflake Task API — task. 13 operations. Lead operation: List Tasks. Self-contained Naftiko capability covering
    one Snowflake business surface.'
  tags:
  - Snowflake
  - task
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
