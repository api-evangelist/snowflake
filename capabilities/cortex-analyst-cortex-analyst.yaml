      description: Send a user feedback of Cortex Analyst response
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cortex-analyst-cortex-analyst.sendfeedback
      with:
        body: tools.body
      outputParameters:
      - type: object
