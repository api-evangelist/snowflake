          type: array
          description: Array of catalog integration objects
          mapping: $.data
        - name: totalCount
          type: integer
          description: Count of returned integrations
          mapping: $.data.length
      - method: POST
        name: create-catalog-integration
        description: Create a catalog integration
        call: snowflake-catalog-integration.create-catalog-integration
        hints:
          readOnly: false
          destructive: false
          idempotent: false
        inputParameters:
        - name: name
          type: string
          description: Unique name of the catalog integration
          required: true
          mapping: $.body.name
        - name: catalog_source
          type: string
          description: Catalog source (e.g. GLUE, OBJECT_STORE, POLARIS)
          required: true
          mapping: $.body.catalog_source
        - name: table_format
          type: string
          description: Table format (e.g. ICEBERG, DELTA)
          required: true
          mapping: $.body.table_format
        - name: enabled
          type: boolean
          description: Whether the integration is enabled on create
          required: false
          mapping: $.body.enabled
        outputParameters:
        - name: integrationName
          type: string
          description: Name of the created integration
          mapping: $.name
        - name: status
          type: string
          description: Operation status
          mapping: $.status
    - path: /v1/notification-integrations
      name: notification-integrations
      description: Notification integration management
      operations:
      - method: GET
        name: list-notification-integrations
        description: List notification integrations
        call: snowflake-notification-integration.list-notification-integrations
        hints:
          readOnly: true
          destructive: false
          idempotent: true
        outputParameters:
        - name: integrations
          type: array
          description: Array of notification integration objects
          mapping: $.data
        - name: totalCount
          type: integer
          description: Count of returned integrations
          mapping: $.data.length
      - method: POST
        name: create-notification-integration
        description: Create a notification integration
        call: snowflake-notification-integration.create-notification-integration
        hints:
          readOnly: false
          destructive: false
          idempotent: false
        inputParameters:
        - name: name
          type: string
          description: Unique name of the notification integration
          required: true
          mapping: $.body.name
        - name: notification_provider
          type: string
          description: Notification provider (e.g. AWS_SNS, AZURE_EVENT_GRID, GCP_PUBSUB)
          required: true
          mapping: $.body.notification_provider
        - name: direction
          type: string
          description: Notification direction (INBOUND or OUTBOUND)
          required: true
          mapping: $.body.direction
        - name: enabled
          type: boolean
          description: Whether the integration is enabled on create
          required: false
          mapping: $.body.enabled
        outputParameters:
        - name: integrationName
          type: string
          description: Name of the created integration
          mapping: $.name
        - name: status
          type: string
          description: Operation status
          mapping: $.status
