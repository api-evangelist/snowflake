naftiko: 1.0.0-alpha2
info:
  label: Snowflake Integrations and Connectors
  description: Unified workflow for managing API integrations, catalog integrations, and notification integrations. Used by
    Platform Engineers and Data Architects to connect Snowflake with external services, catalogs, and notification systems.
  tags:
  - Snowflake
  - Integrations
  - Connectors
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
    SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN
capability:
  consumes:
  - type: http
    namespace: snowflake-api-integration
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake API Integration API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: api-integrations
      path: /api/v2/api-integrations
      description: API integration resources
      operations:
      - name: list-api-integrations
        method: GET
        description: List API integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-api-integration
        method: POST
        description: Create an API integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-api-integration
        method: GET
        description: Fetch an API integration by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-api-integration
        method: DELETE
        description: Delete an API integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-catalog-integration
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Catalog Integration API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: catalog-integrations
      path: /api/v2/catalog-integrations
      description: Catalog integration resources
      operations:
      - name: list-catalog-integrations
        method: GET
        description: List catalog integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-catalog-integration
        method: POST
        description: Create a catalog integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-catalog-integration
        method: GET
        description: Fetch a catalog integration by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-catalog-integration
        method: DELETE
        description: Delete a catalog integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-notification-integration
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Notification Integration API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: notification-integrations
      path: /api/v2/notification-integrations
      description: Notification integration resources
      operations:
      - name: list-notification-integrations
        method: GET
        description: List notification integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-notification-integration
        method: POST
        description: Create a notification integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-notification-integration
        method: GET
        description: Fetch a notification integration by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-notification-integration
        method: DELETE
        description: Delete a notification integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8085
    namespace: snowflake-integrations-api
    description: Unified REST API for Snowflake integration management.
    resources:
    - path: /v1/api-integrations
      name: api-integrations
      description: API integration management
      operations:
      - method: GET
        name: list-api-integrations
        description: List API integrations
        call: snowflake-api-integration.list-api-integrations
        hints:
          readOnly: true
          destructive: false
          idempotent: true
        outputParameters:
        - name: integrations
          type: array
          description: Array of API integration objects
          mapping: $.data
        - name: totalCount
          type: integer
          description: Count of returned integrations
          mapping: $.data.length
      - method: POST
        name: create-api-integration
        description: Create an API integration
        call: snowflake-api-integration.create-api-integration
        hints:
          readOnly: false
          destructive: false
          idempotent: false
        inputParameters:
        - name: name
          type: string
          description: Unique name of the API integration
          required: true
          mapping: $.body.name
        - name: api_provider
          type: string
          description: API provider (e.g. aws_api_gateway, azure_api_management, google_api_gateway)
          required: true
          mapping: $.body.api_provider
        - name: api_allowed_prefixes
          type: array
          description: Allowed endpoint prefixes for the external function
          required: true
          mapping: $.body.api_allowed_prefixes
        - name: enabled
          type: boolean
          description: Whether the integration is enabled on create
          required: false
          mapping: $.body.enabled
        outputParameters:
        - name: integrationName
          type: string
          description: Name of the created integration
          mapping: $.name
        - name: status
          type: string
          description: Operation status
          mapping: $.status
