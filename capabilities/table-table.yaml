        description: List Tables
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: history
          in: query
          type: boolean
          description: Optionally includes dropped tables that have not yet been purged.
        - name: deep
          in: query
          type: boolean
          description: Optionally includes dependency information of the table.
      - name: createtable
        method: POST
        description: Create a Table (clone and Undrop Are Separate Subresources)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-databases-database-schemas-schema-tables-name
      path: /api/v2/databases/{database}/schemas/{schema}/tables/{name}
