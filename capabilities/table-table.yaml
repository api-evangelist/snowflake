  description: 'Snowflake Table API — table. 19 operations. Lead operation: List Tables. Self-contained Naftiko capability
    covering one Snowflake business surface.'
  tags:
  - Snowflake
  - table
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
