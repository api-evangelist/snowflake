naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake View"
  description: "Access, update, and manage View resources in Snowflake."
  tags:
    - Snowflake
    - Views
    - Data Management
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-view
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake View API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: views
          path: /api/v2/databases/{database}/schemas/{schema}/views
          description: "View resources"
          operations:
            - name: list-views
              method: GET
              description: "List views in a schema"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-view
              method: POST
              description: "Create a new view"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-view
              method: GET
              description: "Fetch a view by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-view
              method: DELETE
              description: "Delete a view"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
