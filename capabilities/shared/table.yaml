naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Table"
  description: "Access, update, and manage Table resources in Snowflake."
  tags:
    - Snowflake
    - Tables
    - Data Management
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-table
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Table API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: tables
          path: /api/v2/databases/{database}/schemas/{schema}/tables
          description: "Table resources"
          operations:
            - name: list-tables
              method: GET
              description: "List tables in a schema"
              inputParameters:
                - name: database
                  in: path
                  type: string
                  required: true
                  description: "Database name"
                - name: schema
                  in: path
                  type: string
                  required: true
                  description: "Schema name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-table
              method: POST
              description: "Create a new table"
              inputParameters:
                - name: database
                  in: path
                  type: string
                  required: true
                  description: "Database name"
                - name: schema
                  in: path
                  type: string
                  required: true
                  description: "Schema name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: fetch-table
              method: GET
              description: "Fetch a table by name"
              inputParameters:
                - name: database
                  in: path
                  type: string
                  required: true
                  description: "Database name"
                - name: schema
                  in: path
                  type: string
                  required: true
                  description: "Schema name"
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Table name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-table
              method: DELETE
              description: "Delete a table"
              inputParameters:
                - name: database
                  in: path
                  type: string
                  required: true
                  description: "Database name"
                - name: schema
                  in: path
                  type: string
                  required: true
                  description: "Schema name"
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Table name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: clone-table
              method: POST
              description: "Clone a table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: undrop-table
              method: POST
              description: "Undrop a deleted table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
