naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Database"
  description: "Access, update, and manage Database resources in Snowflake."
  tags:
    - Snowflake
    - Databases
    - Data Management
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-database
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Database API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: databases
          path: /api/v2/databases
          description: "Database resources"
          operations:
            - name: list-databases
              method: GET
              description: "List accessible databases"
              inputParameters:
                - name: like
                  in: query
                  type: string
                  required: false
                  description: "Filter by name pattern"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-database
              method: POST
              description: "Create a new database"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: fetch-database
              method: GET
              description: "Fetch a database by name"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Database name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-database
              method: DELETE
              description: "Delete a database"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Database name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: clone-database
              method: POST
              description: "Clone a database"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Source database name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: undrop-database
              method: POST
              description: "Undrop a deleted database"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Database name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: enable-database-replication
              method: POST
              description: "Enable replication for a database"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Database name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: disable-database-replication
              method: POST
              description: "Disable replication for a database"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Database name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: enable-database-failover
              method: POST
              description: "Enable failover for a database"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Database name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
