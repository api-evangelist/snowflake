naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Stage"
  description: "Access, update, and manage Stage resources for data loading."
  tags:
    - Snowflake
    - Stages
    - Data Loading
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-stage
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Stage API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: stages
          path: /api/v2/databases/{database}/schemas/{schema}/stages
          description: "Stage resources"
          operations:
            - name: list-stages
              method: GET
              description: "List stages"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-stage
              method: POST
              description: "Create a stage"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-stage
              method: GET
              description: "Fetch a stage by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-stage
              method: DELETE
              description: "Delete a stage"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-files
              method: GET
              description: "List files in a stage"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
