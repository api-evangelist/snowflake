naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Service"
  description: "Access, update, and manage Snowpark Container Services."
  tags:
    - Snowflake
    - Services
    - Containers
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-service
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Services API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: services
          path: /api/v2/databases/{database}/schemas/{schema}/services
          description: "Service resources"
          operations:
            - name: list-services
              method: GET
              description: "List services"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-service
              method: POST
              description: "Create a service"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-service
              method: GET
              description: "Fetch a service by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-service
              method: DELETE
              description: "Delete a service"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-service-status
              method: GET
              description: "Fetch service status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-service-logs
              method: GET
              description: "Fetch service logs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: resume-service
              method: POST
              description: "Resume a service"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: suspend-service
              method: POST
              description: "Suspend a service"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
