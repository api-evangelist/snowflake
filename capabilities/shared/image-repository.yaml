naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Image Repository"
  description: "Manage Image Repository resources for container images."
  tags:
    - Snowflake
    - Containers
    - Image Repository
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-image-repository
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Image Repository API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: image-repositories
          path: /api/v2/databases/{database}/schemas/{schema}/image-repositories
          description: "Image repository resources"
          operations:
            - name: list-image-repositories
              method: GET
              description: "List image repositories"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-image-repository
              method: POST
              description: "Create an image repository"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-image-repository
              method: GET
              description: "Fetch an image repository by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-image-repository
              method: DELETE
              description: "Delete an image repository"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
