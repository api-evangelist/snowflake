naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Role"
  description: "Access, update, and manage Role resources in Snowflake."
  tags:
    - Snowflake
    - Roles
    - Access Control
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-role
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Role API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: roles
          path: /api/v2/roles
          description: "Role resources"
          operations:
            - name: list-roles
              method: GET
              description: "List roles"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-role
              method: POST
              description: "Create a role"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-role
              method: GET
              description: "Fetch a role by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-role
              method: DELETE
              description: "Delete a role"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
