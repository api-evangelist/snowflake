naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Grant"
  description: "Manage privileges and grants in Snowflake."
  tags:
    - Snowflake
    - Grants
    - Access Control
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-grant
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Grant API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: grants
          path: /api/v2/grants
          description: "Grant resources"
          operations:
            - name: grant-privilege
              method: POST
              description: "Grant a privilege"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: revoke-privilege
              method: POST
              description: "Revoke a privilege"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-grants-to
              method: GET
              description: "List grants to a role"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
