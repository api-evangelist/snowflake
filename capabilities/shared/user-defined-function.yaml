naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake User Defined Function"
  description: "Access, update, and manage UDF resources in Snowflake."
  tags:
    - Snowflake
    - UDF
    - Programmability
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-udf
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake User Defined Function API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: user-defined-functions
          path: /api/v2/databases/{database}/schemas/{schema}/user-defined-functions
          description: "UDF resources"
          operations:
            - name: list-udfs
              method: GET
              description: "List user defined functions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-udf
              method: POST
              description: "Create a user defined function"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-udf
              method: GET
              description: "Fetch a UDF by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-udf
              method: DELETE
              description: "Delete a UDF"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
