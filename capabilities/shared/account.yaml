naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Account"
  description: "Access, update, and manage Account resources in Snowflake."
  tags:
    - Snowflake
    - Accounts
    - Administration
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-account
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Account API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: accounts
          path: /api/v2/accounts
          description: "Account resources"
          operations:
            - name: list-accounts
              method: GET
              description: "List accessible accounts"
              inputParameters:
                - name: like
                  in: query
                  type: string
                  required: false
                  description: "Filter by name pattern"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-account
              method: POST
              description: "Create a new account"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: delete-account
              method: DELETE
              description: "Delete an account"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Account name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: undrop-account
              method: POST
              description: "Undrop a deleted account"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Account name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
