naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Function"
  description: "Create, execute, and manage Functions in Snowflake."
  tags:
    - Snowflake
    - Functions
    - Programmability
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-function
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Function API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: functions
          path: /api/v2/databases/{database}/schemas/{schema}/functions
          description: "Function resources"
          operations:
            - name: list-functions
              method: GET
              description: "List functions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-function
              method: POST
              description: "Create a function"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-function
              method: GET
              description: "Fetch a function by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-function
              method: DELETE
              description: "Delete a function"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: execute-function
              method: POST
              description: "Execute a function"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
