naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Dynamic Table"
  description: "Access, update, and manage Dynamic Table resources in Snowflake."
  tags:
    - Snowflake
    - Dynamic Tables
    - Data Pipelines
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-dynamic-table
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Dynamic Table API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: dynamic-tables
          path: /api/v2/databases/{database}/schemas/{schema}/dynamic-tables
          description: "Dynamic table resources"
          operations:
            - name: list-dynamic-tables
              method: GET
              description: "List dynamic tables"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-dynamic-table
              method: POST
              description: "Create a dynamic table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-dynamic-table
              method: GET
              description: "Fetch a dynamic table by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-dynamic-table
              method: DELETE
              description: "Delete a dynamic table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: suspend-dynamic-table
              method: POST
              description: "Suspend a dynamic table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: resume-dynamic-table
              method: POST
              description: "Resume a dynamic table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: refresh-dynamic-table
              method: POST
              description: "Refresh a dynamic table"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
