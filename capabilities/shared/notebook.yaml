naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Notebook"
  description: "Access, update, and manage Notebook resources in Snowflake."
  tags:
    - Snowflake
    - Notebooks
    - Data Science
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-notebook
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Notebook API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: notebooks
          path: /api/v2/databases/{database}/schemas/{schema}/notebooks
          description: "Notebook resources"
          operations:
            - name: list-notebooks
              method: GET
              description: "List notebooks"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-notebook
              method: POST
              description: "Create a notebook"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-notebook
              method: GET
              description: "Fetch a notebook by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-notebook
              method: DELETE
              description: "Delete a notebook"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: execute-notebook
              method: POST
              description: "Execute a notebook"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
