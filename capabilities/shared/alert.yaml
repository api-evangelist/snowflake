naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Alert"
  description: "Access, update, and manage Alert resources in Snowflake."
  tags:
    - Snowflake
    - Alerts
    - Monitoring
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-alert
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Alert API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: alerts
          path: /api/v2/databases/{database}/schemas/{schema}/alerts
          description: "Alert resources"
          operations:
            - name: list-alerts
              method: GET
              description: "List alerts"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-alert
              method: POST
              description: "Create an alert"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-alert
              method: GET
              description: "Fetch an alert by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-alert
              method: DELETE
              description: "Delete an alert"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: execute-alert
              method: POST
              description: "Execute an alert"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
