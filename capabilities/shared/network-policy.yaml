naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Network Policy"
  description: "Access, update, and manage Network Policy resources in Snowflake."
  tags:
    - Snowflake
    - Network
    - Security
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-network-policy
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Network Policy API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: network-policies
          path: /api/v2/network-policies
          description: "Network policy resources"
          operations:
            - name: list-network-policies
              method: GET
              description: "List network policies"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-network-policy
              method: POST
              description: "Create a network policy"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-network-policy
              method: GET
              description: "Fetch a network policy by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-network-policy
              method: DELETE
              description: "Delete a network policy"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
