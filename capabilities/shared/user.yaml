naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake User"
  description: "Access, update, and manage User resources in Snowflake."
  tags:
    - Snowflake
    - Users
    - Security
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-user
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake User API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: users
          path: /api/v2/users
          description: "User resources"
          operations:
            - name: list-users
              method: GET
              description: "List users"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: "Create a user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-user
              method: GET
              description: "Fetch a user by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-user
              method: DELETE
              description: "Delete a user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
