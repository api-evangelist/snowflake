naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Catalog Integration"
  description: "Manage Catalog Integration resources in Snowflake."
  tags:
    - Snowflake
    - Catalog
    - Integrations
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-catalog-integration
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Catalog Integration API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: catalog-integrations
          path: /api/v2/catalog-integrations
          description: "Catalog integration resources"
          operations:
            - name: list-catalog-integrations
              method: GET
              description: "List catalog integrations"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-catalog-integration
              method: POST
              description: "Create a catalog integration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-catalog-integration
              method: GET
              description: "Fetch a catalog integration by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-catalog-integration
              method: DELETE
              description: "Delete a catalog integration"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
