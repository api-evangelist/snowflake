naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Database Role"
  description: "Access, update, and manage Database Role resources in Snowflake."
  tags:
    - Snowflake
    - Database Roles
    - Access Control
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-database-role
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Database Role API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: database-roles
          path: /api/v2/databases/{database}/database-roles
          description: "Database role resources"
          operations:
            - name: list-database-roles
              method: GET
              description: "List database roles"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-database-role
              method: POST
              description: "Create a database role"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-database-role
              method: GET
              description: "Fetch a database role by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-database-role
              method: DELETE
              description: "Delete a database role"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
