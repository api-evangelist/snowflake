naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Warehouse"
  description: "Access, customize, and manage virtual warehouses in Snowflake."
  tags:
    - Snowflake
    - Warehouses
    - Compute
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - type: http
      namespace: snowflake-warehouse
      baseUri: "{{SNOWFLAKE_ACCOUNT_URL}}"
      description: "Snowflake Warehouse API"
      authentication:
        type: bearer
        token: "{{SNOWFLAKE_JWT_TOKEN}}"
      resources:
        - name: warehouses
          path: /api/v2/warehouses
          description: "Warehouse resources"
          operations:
            - name: list-warehouses
              method: GET
              description: "List virtual warehouses"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-warehouse
              method: POST
              description: "Create a virtual warehouse"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: fetch-warehouse
              method: GET
              description: "Fetch a warehouse by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-warehouse
              method: DELETE
              description: "Delete a warehouse"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
