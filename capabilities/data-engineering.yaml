# Snowflake Data Engineering — Composed Capability
# Composition: aggregates 9 shared Snowflake source capabilities (SQL API, tasks,
# streams, pipes, stages, functions, procedures, UDFs, results) under a single
# data-engineering domain facade.
# Triple exposure: the same domain is surfaced through (1) a REST adapter for
# conventional clients, (2) an MCP over HTTP server for remote AI agents, (3) an
# MCP over stdio server for local IDE/agent clients, and (4) an Agent Skills
# server for skill-aware agents. One capability, four consumer channels.
# Aligned with Naftiko Framework v1.0.0-alpha1 spec patterns from the
# Use Cases guide (#1 AI integration, #2 Rightsize AI context,
# #8 Capability-first context engineering).
naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Data Engineering"
  description: "Unified workflow for building and managing data pipelines using SQL execution, tasks, streams, pipes, stages, and functions. Used by Data Engineers to orchestrate ETL/ELT workflows and continuous data ingestion."
  tags:
    - Snowflake
    - Data Engineering
    - ETL
    - Data Pipelines
  created: "2026-04-18"
  modified: "2026-04-23"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - import: snowflake-sql
      location: ./shared/sqlapi.yaml
    - import: snowflake-task
      location: ./shared/task.yaml
    - import: snowflake-stream
      location: ./shared/stream.yaml
    - import: snowflake-pipe
      location: ./shared/pipe.yaml
    - import: snowflake-stage
      location: ./shared/stage.yaml
    - import: snowflake-function
      location: ./shared/function.yaml
    - import: snowflake-procedure
      location: ./shared/procedure.yaml
    - import: snowflake-udf
      location: ./shared/user-defined-function.yaml
    - import: snowflake-result
      location: ./shared/result.yaml

  exposes:
    - type: rest
      port: 8081
      namespace: snowflake-data-eng-api
      description: "Unified REST API for Snowflake data pipeline management."
      resources:
        - path: /v1/statements
          name: statements
          description: "SQL statement execution"
          operations:
            - method: POST
              name: submit-statement
              description: "Submit a SQL statement"
              call: "snowflake-sql.submit-statement"
              inputParameters:
                - name: statement
                  type: string
                  description: "SQL statement to execute"
                  required: true
                  mapping: "$.body.statement"
                - name: warehouse
                  type: string
                  description: "Warehouse used to execute the statement"
                  required: false
                  mapping: "$.body.warehouse"
              outputParameters:
                - name: statementHandle
                  type: string
                  description: "Handle identifying the submitted statement"
                  mapping: "$.statementHandle"
                - name: result
                  type: object
                  description: "Raw statement submission payload"
                  mapping: "$."
        - path: /v1/tasks
          name: tasks
          description: "Task management"
          operations:
            - method: GET
              name: list-tasks
              description: "List tasks"
              call: "snowflake-task.list-tasks"
              inputParameters:
                - name: database
                  type: string
                  description: "Database containing the tasks"
                  required: true
                  mapping: "$.path.database"
                - name: schema
                  type: string
                  description: "Schema containing the tasks"
                  required: true
                  mapping: "$.path.schema"
              outputParameters:
                - name: tasks
                  type: array
                  description: "Collection of tasks in the schema"
                  mapping: "$."
            - method: POST
              name: create-task
              description: "Create a task"
              call: "snowflake-task.create-task"
              inputParameters:
                - name: database
                  type: string
                  description: "Database that will own the task"
                  required: true
                  mapping: "$.path.database"
                - name: schema
                  type: string
                  description: "Schema that will own the task"
                  required: true
                  mapping: "$.path.schema"
                - name: name
                  type: string
                  description: "Task name"
                  required: true
                  mapping: "$.body.name"
                - name: definition
                  type: string
                  description: "SQL body of the task"
                  required: true
                  mapping: "$.body.definition"
              outputParameters:
                - name: task
                  type: object
                  description: "Created task definition"
                  mapping: "$."
        - path: /v1/streams
          name: streams
          description: "Stream management"
          operations:
            - method: GET
              name: list-streams
              description: "List streams"
              call: "snowflake-stream.list-streams"
              inputParameters:
                - name: database
                  type: string
                  description: "Database containing the streams"
                  required: true
                  mapping: "$.path.database"
                - name: schema
                  type: string
                  description: "Schema containing the streams"
                  required: true
                  mapping: "$.path.schema"
              outputParameters:
                - name: streams
                  type: array
                  description: "Collection of change data capture streams"
                  mapping: "$."
            - method: POST
              name: create-stream
              description: "Create a stream"
              call: "snowflake-stream.create-stream"
              inputParameters:
                - name: database
                  type: string
                  description: "Database that will own the stream"
                  required: true
                  mapping: "$.path.database"
                - name: schema
                  type: string
                  description: "Schema that will own the stream"
                  required: true
                  mapping: "$.path.schema"
                - name: name
                  type: string
                  description: "Stream name"
                  required: true
                  mapping: "$.body.name"
                - name: table_name
                  type: string
                  description: "Source table tracked by the stream"
                  required: true
                  mapping: "$.body.table_name"
        - path: /v1/pipes
          name: pipes
          description: "Pipe management"
          operations:
            - method: GET
              name: list-pipes
              description: "List pipes"
              call: "snowflake-pipe.list-pipes"
              inputParameters:
                - name: database
                  type: string
                  description: "Database containing the pipes"
                  required: true
                  mapping: "$.path.database"
                - name: schema
                  type: string
                  description: "Schema containing the pipes"
                  required: true
                  mapping: "$.path.schema"
              outputParameters:
                - name: pipes
                  type: array
                  description: "Collection of ingestion pipes"
                  mapping: "$."
            - method: POST
              name: create-pipe
              description: "Create a pipe"
              call: "snowflake-pipe.create-pipe"
              inputParameters:
                - name: database
                  type: string
                  description: "Database that will own the pipe"
                  required: true
                  mapping: "$.path.database"
                - name: schema
                  type: string
                  description: "Schema that will own the pipe"
                  required: true
                  mapping: "$.path.schema"
                - name: name
                  type: string
                  description: "Pipe name"
                  required: true
                  mapping: "$.body.name"
                - name: copy_statement
                  type: string
                  description: "COPY statement that defines the pipe"
                  required: true
                  mapping: "$.body.copy_statement"
        - path: /v1/stages
          name: stages
          description: "Stage management"
          operations:
            - method: GET
              name: list-stages
              description: "List stages"
              call: "snowflake-stage.list-stages"
              inputParameters:
                - name: database
                  type: string
                  description: "Database containing the stages"
                  required: true
                  mapping: "$.path.database"
                - name: schema
                  type: string
                  description: "Schema containing the stages"
                  required: true
                  mapping: "$.path.schema"
              outputParameters:
                - name: stages
                  type: array
                  description: "Collection of data loading stages"
                  mapping: "$."
            - method: POST
              name: create-stage
              description: "Create a stage"
              call: "snowflake-stage.create-stage"
              inputParameters:
                - name: database
                  type: string
                  description: "Database that will own the stage"
                  required: true
                  mapping: "$.path.database"
                - name: schema
                  type: string
                  description: "Schema that will own the stage"
                  required: true
                  mapping: "$.path.schema"
                - name: name
                  type: string
                  description: "Stage name"
                  required: true
                  mapping: "$.body.name"

    - type: mcp
      port: 9081
      namespace: snowflake-data-eng-mcp
      transport: http
      description: "MCP server (HTTP) for AI-assisted Snowflake data pipeline management."
      tools:
        - name: submit-sql
          description: "Submit a SQL statement for execution"
          hints:
            readOnly: false
            destructive: true
            idempotent: false
          call: "snowflake-sql.submit-statement"
          inputParameters:
            - name: statement
              type: string
              description: "SQL statement to execute"
              required: true
              mapping: "$.body.statement"
            - name: warehouse
              type: string
              description: "Warehouse used to execute the statement"
              required: false
              mapping: "$.body.warehouse"
          outputParameters:
            - name: statementHandle
              type: string
              description: "Handle identifying the submitted statement"
              mapping: "$.statementHandle"
            - name: result
              type: object
              description: "Raw statement submission payload"
              mapping: "$."
        - name: get-statement-status
          description: "Get status of a submitted statement"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "snowflake-sql.get-statement-status"
          inputParameters:
            - name: statementHandle
