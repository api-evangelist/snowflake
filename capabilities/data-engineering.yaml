naftiko: 1.0.0-alpha2
info:
  label: Snowflake Data Engineering
  description: Unified workflow for building and managing data pipelines using SQL execution, tasks, streams, pipes, stages,
    and functions. Used by Data Engineers to orchestrate ETL/ELT workflows and continuous data ingestion.
  tags:
  - Snowflake
  - Data Engineering
  - ETL
  - Data Pipelines
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
    SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN
capability:
  consumes:
  - type: http
    namespace: snowflake-sql
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake SQL API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: statements
      path: /api/v2/statements
      description: SQL statement resources
      operations:
      - name: submit-statement
        method: POST
        description: Submit a SQL statement for execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            statement: '{{tools.statement}}'
            warehouse: '{{tools.warehouse}}'
      - name: get-statement-status
        method: GET
        description: Get the status of a submitted statement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: cancel-statement
        method: POST
        description: Cancel a running statement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-task
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Task API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: tasks
      path: /api/v2/databases/{database}/schemas/{schema}/tasks
      description: Task resources
      operations:
      - name: list-tasks
        method: GET
        description: List tasks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-task
        method: POST
        description: Create a task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-task
        method: GET
        description: Fetch a task by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-task
        method: DELETE
        description: Delete a task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: execute-task
        method: POST
        description: Execute a task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: resume-task
        method: POST
        description: Resume a suspended task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: suspend-task
        method: POST
        description: Suspend a task
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-stream
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Stream API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: streams
      path: /api/v2/databases/{database}/schemas/{schema}/streams
      description: Stream resources
      operations:
      - name: list-streams
        method: GET
        description: List streams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-stream
        method: POST
        description: Create a stream
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-stream
        method: GET
        description: Fetch a stream by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-stream
        method: DELETE
        description: Delete a stream
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-pipe
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Pipe API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: pipes
      path: /api/v2/databases/{database}/schemas/{schema}/pipes
      description: Pipe resources
      operations:
      - name: list-pipes
        method: GET
        description: List pipes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-pipe
        method: POST
        description: Create a pipe
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-pipe
        method: GET
        description: Fetch a pipe by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-pipe
        method: DELETE
        description: Delete a pipe
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: refresh-pipe
        method: POST
        description: Refresh a pipe
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-stage
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Stage API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: stages
      path: /api/v2/databases/{database}/schemas/{schema}/stages
      description: Stage resources
      operations:
      - name: list-stages
        method: GET
        description: List stages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-stage
        method: POST
        description: Create a stage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-stage
        method: GET
        description: Fetch a stage by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-stage
        method: DELETE
        description: Delete a stage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-files
        method: GET
        description: List files in a stage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-function
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Function API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: functions
      path: /api/v2/databases/{database}/schemas/{schema}/functions
      description: Function resources
      operations:
      - name: list-functions
        method: GET
        description: List functions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-function
        method: POST
        description: Create a function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-function
        method: GET
        description: Fetch a function by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-function
        method: DELETE
        description: Delete a function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: execute-function
        method: POST
        description: Execute a function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-procedure
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Procedure API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: procedures
      path: /api/v2/databases/{database}/schemas/{schema}/procedures
      description: Procedure resources
      operations:
      - name: list-procedures
        method: GET
        description: List procedures
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-procedure
        method: POST
        description: Create a procedure
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-procedure
        method: GET
        description: Fetch a procedure by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-procedure
        method: DELETE
        description: Delete a procedure
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: call-procedure
        method: POST
        description: Call a procedure
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-udf
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake User Defined Function API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: user-defined-functions
      path: /api/v2/databases/{database}/schemas/{schema}/user-defined-functions
      description: UDF resources
      operations:
      - name: list-udfs
        method: GET
        description: List user defined functions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-udf
        method: POST
        description: Create a user defined function
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: fetch-udf
        method: GET
        description: Fetch a UDF by name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-udf
        method: DELETE
        description: Delete a UDF
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: snowflake-result
    baseUri: '{{SNOWFLAKE_ACCOUNT_URL}}'
    description: Snowflake Result API
    authentication:
      type: bearer
      token: '{{SNOWFLAKE_JWT_TOKEN}}'
    resources:
    - name: results
      path: /api/v2/results
      description: Result resources
      operations:
      - name: get-result
        method: GET
        description: Get a query result
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: snowflake-data-eng-api
    description: Unified REST API for Snowflake data pipeline management.
    resources:
    - path: /v1/statements
      name: statements
      description: SQL statement execution
      operations:
      - method: POST
        name: submit-statement
        description: Submit a SQL statement
        call: snowflake-sql.submit-statement
        inputParameters:
        - name: statement
          type: string
          description: SQL statement to execute
          required: true
          mapping: $.body.statement
        - name: warehouse
          type: string
          description: Warehouse used to execute the statement
          required: false
          mapping: $.body.warehouse
        outputParameters:
        - name: statementHandle
          type: string
          description: Handle identifying the submitted statement
          mapping: $.statementHandle
        - name: result
          type: object
          description: Raw statement submission payload
          mapping: $.
    - path: /v1/tasks
      name: tasks
      description: Task management
      operations:
      - method: GET
        name: list-tasks
        description: List tasks
        call: snowflake-task.list-tasks
        inputParameters:
        - name: database
          type: string
          description: Database containing the tasks
          required: true
          mapping: $.path.database
        - name: schema
          type: string
          description: Schema containing the tasks
          required: true
          mapping: $.path.schema
        outputParameters:
        - name: tasks
          type: array
          description: Collection of tasks in the schema
          mapping: $.
      - method: POST
        name: create-task
        description: Create a task
        call: snowflake-task.create-task
        inputParameters:
        - name: database
          type: string
          description: Database that will own the task
          required: true
          mapping: $.path.database
        - name: schema
          type: string
          description: Schema that will own the task
          required: true
          mapping: $.path.schema
        - name: name
          type: string
          description: Task name
          required: true
          mapping: $.body.name
        - name: definition
          type: string
          description: SQL body of the task
          required: true
          mapping: $.body.definition
        outputParameters:
        - name: task
          type: object
          description: Created task definition
          mapping: $.
    - path: /v1/streams
      name: streams
      description: Stream management
      operations:
      - method: GET
        name: list-streams
        description: List streams
        call: snowflake-stream.list-streams
        inputParameters:
        - name: database
          type: string
          description: Database containing the streams
          required: true
          mapping: $.path.database
        - name: schema
          type: string
          description: Schema containing the streams
          required: true
          mapping: $.path.schema
        outputParameters:
        - name: streams
          type: array
          description: Collection of change data capture streams
          mapping: $.
      - method: POST
        name: create-stream
        description: Create a stream
        call: snowflake-stream.create-stream
        inputParameters:
        - name: database
          type: string
          description: Database that will own the stream
          required: true
          mapping: $.path.database
        - name: schema
          type: string
          description: Schema that will own the stream
          required: true
          mapping: $.path.schema
        - name: name
          type: string
          description: Stream name
          required: true
          mapping: $.body.name
        - name: table_name
          type: string
          description: Source table tracked by the stream
          required: true
          mapping: $.body.table_name
    - path: /v1/pipes
      name: pipes
      description: Pipe management
      operations:
      - method: GET
        name: list-pipes
        description: List pipes
        call: snowflake-pipe.list-pipes
        inputParameters:
        - name: database
          type: string
          description: Database containing the pipes
          required: true
          mapping: $.path.database
        - name: schema
          type: string
          description: Schema containing the pipes
          required: true
          mapping: $.path.schema
        outputParameters:
        - name: pipes
          type: array
          description: Collection of ingestion pipes
          mapping: $.
      - method: POST
        name: create-pipe
        description: Create a pipe
        call: snowflake-pipe.create-pipe
        inputParameters:
        - name: database
          type: string
          description: Database that will own the pipe
          required: true
          mapping: $.path.database
        - name: schema
          type: string
          description: Schema that will own the pipe
          required: true
          mapping: $.path.schema
        - name: name
          type: string
          description: Pipe name
          required: true
          mapping: $.body.name
        - name: copy_statement
          type: string
          description: COPY statement that defines the pipe
          required: true
          mapping: $.body.copy_statement
    - path: /v1/stages
      name: stages
      description: Stage management
      operations:
      - method: GET
        name: list-stages
        description: List stages
        call: snowflake-stage.list-stages
        inputParameters:
        - name: database
          type: string
          description: Database containing the stages
          required: true
          mapping: $.path.database
        - name: schema
          type: string
          description: Schema containing the stages
          required: true
          mapping: $.path.schema
        outputParameters:
        - name: stages
          type: array
          description: Collection of data loading stages
          mapping: $.
      - method: POST
        name: create-stage
        description: Create a stage
        call: snowflake-stage.create-stage
        inputParameters:
        - name: database
          type: string
          description: Database that will own the stage
          required: true
          mapping: $.path.database
        - name: schema
          type: string
          description: Schema that will own the stage
          required: true
          mapping: $.path.schema
        - name: name
          type: string
          description: Stage name
          required: true
          mapping: $.body.name
  - type: mcp
    port: 9081
    namespace: snowflake-data-eng-mcp
    transport: http
    description: MCP server (HTTP) for AI-assisted Snowflake data pipeline management.
    tools:
    - name: submit-sql
      description: Submit a SQL statement for execution
      hints:
        readOnly: false
        destructive: true
        idempotent: false
      call: snowflake-sql.submit-statement
      inputParameters:
      - name: statement
        type: string
        description: SQL statement to execute
        required: true
        mapping: $.body.statement
      - name: warehouse
        type: string
        description: Warehouse used to execute the statement
        required: false
        mapping: $.body.warehouse
      outputParameters:
      - name: statementHandle
        type: string
        description: Handle identifying the submitted statement
        mapping: $.statementHandle
      - name: result
        type: object
        description: Raw statement submission payload
        mapping: $.
    - name: get-statement-status
      description: Get status of a submitted statement
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: snowflake-sql.get-statement-status
      inputParameters:
      - name: statementHandle
        type: string
        description: Handle of the statement to inspect
        required: true
        mapping: $.path.statementHandle
      outputParameters:
      - name: status
        type: string
        description: Current execution status
        mapping: $.status
      - name: result
        type: object
        description: Full status payload
        mapping: $.
    - name: cancel-statement
      description: Cancel a running statement
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: snowflake-sql.cancel-statement
      inputParameters:
      - name: statementHandle
        type: string
        description: Handle of the statement to cancel
        required: true
        mapping: $.path.statementHandle
      outputParameters:
      - name: result
        type: object
        description: Cancellation response
        mapping: $.
    - name: list-tasks
      description: List scheduled tasks
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: snowflake-task.list-tasks
      inputParameters:
      - name: database
        type: string
        description: Database containing the tasks
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema containing the tasks
        required: true
        mapping: $.path.schema
      outputParameters:
      - name: tasks
        type: array
        description: Collection of tasks in the schema
        mapping: $.
    - name: create-task
      description: Create a scheduled task
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: snowflake-task.create-task
      inputParameters:
      - name: database
        type: string
        description: Database that will own the task
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema that will own the task
        required: true
        mapping: $.path.schema
      - name: name
        type: string
        description: Task name
        required: true
        mapping: $.body.name
      - name: definition
        type: string
        description: SQL body of the task
        required: true
        mapping: $.body.definition
    - name: execute-task
      description: Execute a task immediately
      hints:
        readOnly: false
        destructive: true
        idempotent: false
      call: snowflake-task.execute-task
      inputParameters:
      - name: database
        type: string
        description: Database containing the task
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema containing the task
        required: true
        mapping: $.path.schema
      - name: name
        type: string
        description: Task name to execute
        required: true
        mapping: $.path.name
    - name: resume-task
      description: Resume a suspended task
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: snowflake-task.resume-task
      inputParameters:
      - name: database
        type: string
        description: Database containing the task
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema containing the task
        required: true
        mapping: $.path.schema
      - name: name
        type: string
        description: Task name to resume
        required: true
        mapping: $.path.name
    - name: suspend-task
      description: Suspend a running task
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: snowflake-task.suspend-task
      inputParameters:
      - name: database
        type: string
        description: Database containing the task
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema containing the task
        required: true
        mapping: $.path.schema
      - name: name
        type: string
        description: Task name to suspend
        required: true
        mapping: $.path.name
    - name: list-streams
      description: List change data capture streams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: snowflake-stream.list-streams
      inputParameters:
      - name: database
        type: string
        description: Database containing the streams
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema containing the streams
        required: true
        mapping: $.path.schema
      outputParameters:
      - name: streams
        type: array
        description: Collection of CDC streams
        mapping: $.
    - name: create-stream
      description: Create a CDC stream
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: snowflake-stream.create-stream
      inputParameters:
      - name: database
        type: string
        description: Database that will own the stream
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema that will own the stream
        required: true
        mapping: $.path.schema
      - name: name
        type: string
        description: Stream name
        required: true
        mapping: $.body.name
      - name: table_name
        type: string
        description: Source table tracked by the stream
        required: true
        mapping: $.body.table_name
    - name: list-pipes
      description: List data ingestion pipes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: snowflake-pipe.list-pipes
      inputParameters:
      - name: database
        type: string
        description: Database containing the pipes
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema containing the pipes
        required: true
        mapping: $.path.schema
      outputParameters:
      - name: pipes
        type: array
        description: Collection of ingestion pipes
        mapping: $.
    - name: create-pipe
      description: Create a pipe for continuous ingestion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: snowflake-pipe.create-pipe
      inputParameters:
      - name: database
        type: string
        description: Database that will own the pipe
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema that will own the pipe
        required: true
        mapping: $.path.schema
      - name: name
        type: string
        description: Pipe name
        required: true
        mapping: $.body.name
      - name: copy_statement
        type: string
        description: COPY statement that defines the pipe
        required: true
        mapping: $.body.copy_statement
    - name: refresh-pipe
      description: Refresh a pipe
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: snowflake-pipe.refresh-pipe
      inputParameters:
      - name: database
        type: string
        description: Database containing the pipe
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema containing the pipe
        required: true
        mapping: $.path.schema
      - name: name
        type: string
        description: Pipe name to refresh
        required: true
        mapping: $.path.name
    - name: list-stages
      description: List data loading stages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: snowflake-stage.list-stages
      inputParameters:
      - name: database
        type: string
        description: Database containing the stages
        required: true
        mapping: $.path.database
      - name: schema
        type: string
        description: Schema containing the stages
        required: true
        mapping: $.path.schema
      outputParameters:
      - name: stages
        type: array
        description: Collection of data loading stages
        mapping: $.
    - name: create-stage
      description: Create a stage
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: snowflake-stage.create-stage
      inputParameters:
      - name: database
        type: string
        description: Database that will own the stage
        required: true
        mapping: $.path.database
      - name: schema
        type: string
