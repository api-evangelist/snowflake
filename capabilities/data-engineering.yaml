            - name: name
              type: string
              description: "Pipe name"
              required: true
              mapping: "$.body.name"
            - name: copy_statement
              type: string
              description: "COPY statement that defines the pipe"
              required: true
              mapping: "$.body.copy_statement"
        - name: refresh-pipe
          description: "Refresh a pipe"
          hints:
            readOnly: false
