          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "snowflake-pipe.list-pipes"
          inputParameters:
            - name: database
              type: string
              description: "Database containing the pipes"
              required: true
              mapping: "$.path.database"
            - name: schema
              type: string
              description: "Schema containing the pipes"
              required: true
              mapping: "$.path.schema"
          outputParameters:
            - name: pipes
              type: array
              description: "Collection of ingestion pipes"
              mapping: "$."
        - name: create-pipe
          description: "Create a pipe for continuous ingestion"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
