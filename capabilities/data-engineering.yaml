              mapping: "$.path.database"
            - name: schema
              type: string
              description: "Schema containing the streams"
              required: true
              mapping: "$.path.schema"
          outputParameters:
            - name: streams
              type: array
              description: "Collection of CDC streams"
              mapping: "$."
        - name: create-stream
          description: "Create a CDC stream"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "snowflake-stream.create-stream"
          inputParameters:
            - name: database
              type: string
              description: "Database that will own the stream"
              required: true
              mapping: "$.path.database"
            - name: schema
              type: string
              description: "Schema that will own the stream"
              required: true
