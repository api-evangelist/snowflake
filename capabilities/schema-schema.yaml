naftiko: 1.0.0-alpha2
info:
  label: Snowflake Schema API — schema
  description: 'Snowflake Schema API — schema. 7 operations. Lead operation: List Schemas.. Self-contained Naftiko capability
    covering one Snowflake business surface.'
  tags:
  - Snowflake
  - schema
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SNOWFLAKE_API_KEY: SNOWFLAKE_API_KEY
capability:
  consumes:
  - type: http
    namespace: schema-schema
    baseUri: https://org-account.snowflakecomputing.com
    description: Snowflake Schema API — schema business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-databases-database-schemas
      path: /api/v2/databases/{database}/schemas
      operations:
      - name: listschemas
        method: GET
        description: List Schemas.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: history
          in: query
          type: boolean
          description: 'Whether to include dropped schemas that have not yet been purged. Default: `false`.'
      - name: createschema
        method: POST
        description: Create a Schema.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: kind
          in: query
          type: string
          description: Type of schema to create. Currently, Snowflake supports only `transient` and `permanent` (also represented
            by the empty string).
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-databases-database-schemas-name
      path: /api/v2/databases/{database}/schemas/{name}
      operations:
      - name: fetchschema
        method: GET
        description: Fetches a schema.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createoralterschema
        method: PUT
        description: Create a New, or Alters an Existing, Schema.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: kind
          in: query
          type: string
          description: Type of schema to create. Currently, Snowflake supports only `transient` and `permanent` (also represented
            by the empty string).
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteschema
        method: DELETE
        description: Delete a Schema.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: restrict
          in: query
          type: boolean
          description: Whether to drop the schema if foreign keys exist that reference any tables in the schema.
    - name: api-v2-databases-database-schemas-name}:clone
      path: /api/v2/databases/{database}/schemas/{name}:clone
      operations:
      - name: cloneschema
        method: POST
        description: Clone a Schema.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: kind
          in: query
          type: string
          description: Type of schema to clone. Currently, Snowflake supports only `transient` and `permanent` (also represented
            by the empty string).
        - name: targetDatabase
          in: query
          type: string
          description: Database of the newly created schema. Defaults to the source schema's database.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-databases-database-schemas-name}:undrop
      path: /api/v2/databases/{database}/schemas/{name}:undrop
      operations:
      - name: undropschema
        method: POST
        description: Undrop a Schema.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: schema-schema-rest
    port: 8080
    description: REST adapter for Snowflake Schema API — schema. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/databases/{database}/schemas
      name: api-v2-databases-database-schemas
      description: REST surface for api-v2-databases-database-schemas.
      operations:
      - method: GET
        name: listschemas
        description: List Schemas.
        call: schema-schema.listschemas
        with:
          history: rest.history
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createschema
        description: Create a Schema.
        call: schema-schema.createschema
        with:
          kind: rest.kind
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/databases/{database}/schemas/{name}
      name: api-v2-databases-database-schemas-name
      description: REST surface for api-v2-databases-database-schemas-name.
      operations:
      - method: GET
        name: fetchschema
        description: Fetches a schema.
        call: schema-schema.fetchschema
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: createoralterschema
        description: Create a New, or Alters an Existing, Schema.
        call: schema-schema.createoralterschema
        with:
          kind: rest.kind
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteschema
        description: Delete a Schema.
        call: schema-schema.deleteschema
        with:
          restrict: rest.restrict
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/databases/{database}/schemas/name-clone
      name: api-v2-databases-database-schemas-name-clone
      description: REST surface for api-v2-databases-database-schemas-name}:clone.
      operations:
      - method: POST
        name: cloneschema
        description: Clone a Schema.
        call: schema-schema.cloneschema
        with:
          kind: rest.kind
          targetDatabase: rest.targetDatabase
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/databases/{database}/schemas/name-undrop
      name: api-v2-databases-database-schemas-name-undrop
      description: REST surface for api-v2-databases-database-schemas-name}:undrop.
      operations:
      - method: POST
        name: undropschema
        description: Undrop a Schema.
        call: schema-schema.undropschema
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: schema-schema-mcp
    port: 9090
    transport: http
    description: MCP adapter for Snowflake Schema API — schema. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-schemas
      description: List Schemas.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: schema-schema.listschemas
      with:
        history: tools.history
      outputParameters:
      - type: object
        mapping: $.
    - name: create-schema
      description: Create a Schema.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: schema-schema.createschema
      with:
        kind: tools.kind
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fetches-schema
      description: Fetches a schema.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: schema-schema.fetchschema
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-alters-existing-schema
      description: Create a New, or Alters an Existing, Schema.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: schema-schema.createoralterschema
      with:
        kind: tools.kind
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-schema
      description: Delete a Schema.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: schema-schema.deleteschema
      with:
        restrict: tools.restrict
      outputParameters:
      - type: object
        mapping: $.
    - name: clone-schema
      description: Clone a Schema.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: schema-schema.cloneschema
      with:
        kind: tools.kind
        targetDatabase: tools.targetDatabase
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: undrop-schema
      description: Undrop a Schema.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: schema-schema.undropschema
      outputParameters:
      - type: object
        mapping: $.
