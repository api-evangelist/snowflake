naftiko: 1.0.0-alpha2
info:
  label: Snowflake Account API — account
  description: 'Snowflake Account API — account. 4 operations. Lead operation: List Accounts.. Self-contained Naftiko capability
    covering one Snowflake business surface.'
  tags:
  - Snowflake
  - account
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SNOWFLAKE_API_KEY: SNOWFLAKE_API_KEY
capability:
  consumes:
  - type: http
    namespace: account-account
    baseUri: https://org-account.snowflakecomputing.com
    description: Snowflake Account API — account business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-accounts
      path: /api/v2/accounts
      operations:
      - name: listaccounts
        method: GET
        description: List Accounts.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: history
          in: query
          type: boolean
          description: Optionally includes dropped accounts that have not yet been purged.
      - name: createaccount
        method: POST
        description: Create an Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v2-accounts-name
      path: /api/v2/accounts/{name}
      operations:
      - name: deleteaccount
        method: DELETE
        description: Delete an Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: gracePeriodInDays
          in: query
          type: integer
          description: Specifies the number of days during which the account can be restored (“undropped”). The minimum is
            3 days and the maximum is 90 days.
          required: true
    - name: api-v2-accounts-name}:undrop
      path: /api/v2/accounts/{name}:undrop
      operations:
      - name: undropaccount
        method: POST
        description: Restore an Account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: account-account-rest
    port: 8080
    description: REST adapter for Snowflake Account API — account. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v2/accounts
      name: api-v2-accounts
      description: REST surface for api-v2-accounts.
      operations:
      - method: GET
        name: listaccounts
        description: List Accounts.
        call: account-account.listaccounts
        with:
          history: rest.history
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createaccount
        description: Create an Account.
        call: account-account.createaccount
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/accounts/{name}
      name: api-v2-accounts-name
      description: REST surface for api-v2-accounts-name.
      operations:
      - method: DELETE
        name: deleteaccount
        description: Delete an Account.
        call: account-account.deleteaccount
        with:
          gracePeriodInDays: rest.gracePeriodInDays
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v2/accounts/name-undrop
      name: api-v2-accounts-name-undrop
      description: REST surface for api-v2-accounts-name}:undrop.
      operations:
      - method: POST
        name: undropaccount
        description: Restore an Account.
        call: account-account.undropaccount
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: account-account-mcp
    port: 9090
    transport: http
    description: MCP adapter for Snowflake Account API — account. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-accounts
      description: List Accounts.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: account-account.listaccounts
      with:
        history: tools.history
      outputParameters:
      - type: object
        mapping: $.
    - name: create-account
      description: Create an Account.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-account.createaccount
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-account
      description: Delete an Account.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: account-account.deleteaccount
      with:
        gracePeriodInDays: tools.gracePeriodInDays
      outputParameters:
      - type: object
        mapping: $.
    - name: restore-account
      description: Restore an Account.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: account-account.undropaccount
      outputParameters:
      - type: object
        mapping: $.
