# Spec-Driven Integration notes:
# This capability composes 4 shared Snowflake capabilities (cortex-analyst,
# cortex-inference, cortex-search-service, notebook) and exposes them across
# MCP (http + stdio transports), Agent Skills, and REST — a single integration
# layer serving traditional clients, remote MCP agents, local stdio MCP agents,
# and Agent Skill runtimes from one declarative spec.

naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Cortex AI"
  description: "Unified workflow for AI and ML capabilities including LLM inference, natural language analytics, semantic search, and notebook-based development. Used by Data Scientists and ML Engineers for AI-powered data exploration and model deployment."
  tags:
    - Snowflake
    - Cortex
    - AI
    - Machine Learning
  created: "2026-04-18"
  modified: "2026-04-23"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - import: snowflake-cortex-analyst
      location: ./shared/cortex-analyst.yaml
    - import: snowflake-cortex-inference
      location: ./shared/cortex-inference.yaml
    - import: snowflake-cortex-search
      location: ./shared/cortex-search-service.yaml
    - import: snowflake-notebook
      location: ./shared/notebook.yaml

  exposes:
    - type: rest
      port: 8082
      namespace: snowflake-cortex-api
      description: "Unified REST API for Snowflake Cortex AI capabilities."
      resources:
        - path: /v1/analyst/messages
          name: analyst-messages
          description: "Natural language data analytics"
          operations:
            - method: POST
              name: send-analyst-message
              description: "Ask a question about your data"
              call: "snowflake-cortex-analyst.send-message"
              inputParameters:
                - name: messages
                  type: array
                  description: "Conversation messages to send to Cortex Analyst"
                  required: true
                  mapping: "body.messages"
                - name: semantic_model_file
                  type: string
                  description: "Reference to the semantic model file (e.g. @db.schema.stage/model.yaml)"
                  required: false
                  mapping: "body.semantic_model_file"
              outputParameters:
                - name: request_id
                  type: string
                  mapping: "$.request_id"
                - name: message
                  type: object
                  mapping: "$.message"
                - name: warnings
                  type: array
                  mapping: "$.warnings"
        - path: /v1/inference/complete
          name: inference
          description: "LLM inference"
          operations:
            - method: POST
              name: complete
              description: "Run LLM completion"
              call: "snowflake-cortex-inference.complete"
              inputParameters:
                - name: model
                  type: string
                  description: "Identifier of the Cortex LLM model to run completion against"
                  required: true
                  mapping: "body.model"
                - name: prompt
                  type: string
                  description: "Prompt text to submit for completion"
                  required: true
                  mapping: "body.prompt"
              outputParameters:
                - name: id
                  type: string
                  mapping: "$.id"
                - name: model
                  type: string
                  mapping: "$.model"
                - name: choices
                  type: array
                  mapping: "$.choices"
                - name: usage
                  type: object
                  mapping: "$.usage"
        - path: /v1/inference/models
          name: models
          description: "Available models"
          operations:
            - method: GET
              name: list-models
              description: "List available LLM models"
              call: "snowflake-cortex-inference.get-models"
              inputParameters: []
              outputParameters:
                - name: models
                  type: array
                  mapping: "$.data"
        - path: /v1/search
          name: search
          description: "Semantic search"
          operations:
            - method: POST
              name: query-search
              description: "Query a search service"
              call: "snowflake-cortex-search.query-search-service"
              inputParameters:
                - name: database
                  type: string
                  description: "Database containing the search service"
                  required: true
                  mapping: "path.database"
                - name: schema
                  type: string
                  description: "Schema containing the search service"
                  required: true
                  mapping: "path.schema"
                - name: query
                  type: string
                  description: "Natural language query string"
                  required: true
                  mapping: "body.query"
                - name: columns
                  type: array
                  description: "Columns to return from the search index"
                  required: false
                  mapping: "body.columns"
                - name: limit
                  type: integer
                  description: "Maximum number of results to return"
                  required: false
                  mapping: "body.limit"
              outputParameters:
                - name: results
                  type: array
                  mapping: "$.results"
                - name: request_id
                  type: string
                  mapping: "$.request_id"
        - path: /v1/notebooks
          name: notebooks
          description: "Notebook management"
          operations:
            - method: GET
              name: list-notebooks
              description: "List notebooks"
              call: "snowflake-notebook.list-notebooks"
              inputParameters:
                - name: database
                  type: string
                  description: "Database to list notebooks from"
                  required: true
                  mapping: "path.database"
                - name: schema
                  type: string
                  description: "Schema to list notebooks from"
                  required: true
                  mapping: "path.schema"
              outputParameters:
                - name: notebooks
                  type: array
                  mapping: "$.data"
            - method: POST
              name: create-notebook
              description: "Create a notebook"
              call: "snowflake-notebook.create-notebook"
              inputParameters:
                - name: database
                  type: string
                  description: "Database to create the notebook in"
                  required: true
                  mapping: "path.database"
                - name: schema
                  type: string
                  description: "Schema to create the notebook in"
                  required: true
                  mapping: "path.schema"
                - name: name
                  type: string
                  description: "Notebook name"
                  required: true
                  mapping: "body.name"
                - name: comment
                  type: string
                  description: "Optional comment describing the notebook"
                  required: false
                  mapping: "body.comment"
                - name: query_warehouse
                  type: string
                  description: "Warehouse used to execute notebook cells"
                  required: false
                  mapping: "body.query_warehouse"
              outputParameters:
                - name: name
                  type: string
                  mapping: "$.name"
                - name: database_name
                  type: string
                  mapping: "$.database_name"
                - name: schema_name
                  type: string
                  mapping: "$.schema_name"
                - name: created_on
                  type: string
                  mapping: "$.created_on"

    - type: mcp
      port: 9082
      namespace: snowflake-cortex-mcp
      transport: http
      description: "MCP server (streaming HTTP) for AI-assisted Snowflake Cortex AI capabilities."
      tools:
