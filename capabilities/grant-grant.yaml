      - name: revokeprivilegegrantoption
        method: DELETE
        description: Revoke the Grant Option for the Specified Privilege on the Named Securable From the Named Grantee.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
