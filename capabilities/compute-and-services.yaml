# This capability composes the imported shared Snowflake capabilities
# (warehouse, compute-pool, service, image-repository, alert) and exposes
# them uniformly across MCP (http + stdio), Agent Skills, and REST — so one
# integration layer serves remote MCP agents, local IDE agents, skill hosts,
# and conventional REST clients.
naftiko: "1.0.0-alpha1"

info:
  label: "Snowflake Compute and Services"
  description: "Unified workflow for managing warehouses, compute pools, Snowpark Container Services, image repositories, and monitoring alerts. Used by Platform Engineers and DevOps teams to provision and operate compute infrastructure."
  tags:
    - Snowflake
    - Compute
    - Containers
    - Infrastructure
  created: "2026-04-18"
  modified: "2026-04-23"

binds:
  - namespace: env
    keys:
      SNOWFLAKE_ACCOUNT_URL: SNOWFLAKE_ACCOUNT_URL
      SNOWFLAKE_JWT_TOKEN: SNOWFLAKE_JWT_TOKEN

capability:
  consumes:
    - import: snowflake-warehouse
      location: ./shared/warehouse.yaml
    - import: snowflake-compute-pool
      location: ./shared/compute-pool.yaml
    - import: snowflake-service
      location: ./shared/service.yaml
    - import: snowflake-image-repository
      location: ./shared/image-repository.yaml
    - import: snowflake-alert
      location: ./shared/alert.yaml

  exposes:
    - type: rest
      port: 8084
      namespace: snowflake-compute-api
      description: "Unified REST API for Snowflake compute and services management."
      resources:
        - path: /v1/warehouses
          name: warehouses
          description: "Warehouse management"
          operations:
            - method: GET
              name: list-warehouses
              description: "List warehouses"
              call: "snowflake-warehouse.list-warehouses"
              inputParameters:
                - name: like
                  type: string
                  description: "Optional LIKE pattern to filter warehouse names."
                  required: false
                  mapping: "queryParameters.like"
              outputParameters:
                - name: warehouses
                  type: array
                  mapping: "$[*]"
                - name: count
                  type: integer
                  mapping: "$.length"
            - method: POST
              name: create-warehouse
              description: "Create a warehouse"
              call: "snowflake-warehouse.create-warehouse"
              inputParameters:
                - name: name
                  type: string
                  description: "Warehouse name."
                  required: true
                  mapping: "body.name"
                - name: warehouse_size
                  type: string
                  description: "Warehouse size (e.g. XSMALL, SMALL, MEDIUM)."
                  required: false
                  mapping: "body.warehouse_size"
                - name: auto_suspend
                  type: integer
                  description: "Auto-suspend idle timeout in seconds."
                  required: false
                  mapping: "body.auto_suspend"
              outputParameters:
                - name: name
                  type: string
                  mapping: "$.name"
                - name: state
                  type: string
                  mapping: "$.state"
        - path: /v1/compute-pools
          name: compute-pools
          description: "Compute pool management"
          operations:
            - method: GET
              name: list-compute-pools
              description: "List compute pools"
              call: "snowflake-compute-pool.list-compute-pools"
              inputParameters:
                - name: like
                  type: string
                  description: "Optional LIKE pattern to filter compute pool names."
                  required: false
                  mapping: "queryParameters.like"
              outputParameters:
                - name: compute_pools
                  type: array
                  mapping: "$[*]"
                - name: count
                  type: integer
                  mapping: "$.length"
            - method: POST
              name: create-compute-pool
              description: "Create a compute pool"
              call: "snowflake-compute-pool.create-compute-pool"
              inputParameters:
                - name: name
                  type: string
                  description: "Compute pool name."
                  required: true
                  mapping: "body.name"
                - name: instance_family
                  type: string
                  description: "Instance family (e.g. CPU_X64_XS)."
                  required: true
                  mapping: "body.instance_family"
                - name: min_nodes
                  type: integer
                  description: "Minimum node count."
                  required: true
                  mapping: "body.min_nodes"
                - name: max_nodes
                  type: integer
                  description: "Maximum node count."
                  required: true
                  mapping: "body.max_nodes"
              outputParameters:
                - name: name
                  type: string
                  mapping: "$.name"
                - name: state
                  type: string
                  mapping: "$.state"
        - path: /v1/services
          name: services
          description: "Container service management"
          operations:
            - method: GET
              name: list-services
              description: "List services"
              call: "snowflake-service.list-services"
              inputParameters:
                - name: database
                  type: string
                  description: "Target database name."
                  required: true
                  mapping: "pathParameters.database"
                - name: schema
                  type: string
                  description: "Target schema name."
                  required: true
                  mapping: "pathParameters.schema"
              outputParameters:
                - name: services
                  type: array
                  mapping: "$[*]"
                - name: count
                  type: integer
                  mapping: "$.length"
            - method: POST
              name: create-service
              description: "Create a service"
              call: "snowflake-service.create-service"
              inputParameters:
                - name: database
                  type: string
                  description: "Target database name."
                  required: true
                  mapping: "pathParameters.database"
                - name: schema
                  type: string
                  description: "Target schema name."
                  required: true
                  mapping: "pathParameters.schema"
                - name: name
                  type: string
                  description: "Service name."
                  required: true
                  mapping: "body.name"
                - name: compute_pool
                  type: string
                  description: "Compute pool name that runs the service."
                  required: true
                  mapping: "body.compute_pool"
                - name: spec
                  type: object
                  description: "Service specification (image, endpoints, env)."
                  required: true
                  mapping: "body.spec"
              outputParameters:
                - name: name
                  type: string
                  mapping: "$.name"
                - name: status
                  type: string
                  mapping: "$.status"
        - path: /v1/alerts
          name: alerts
          description: "Alert management"
          operations:
            - method: GET
              name: list-alerts
              description: "List alerts"
              call: "snowflake-alert.list-alerts"
              inputParameters:
                - name: database
                  type: string
                  description: "Target database name."
                  required: true
                  mapping: "pathParameters.database"
                - name: schema
                  type: string
                  description: "Target schema name."
                  required: true
                  mapping: "pathParameters.schema"
              outputParameters:
                - name: alerts
                  type: array
                  mapping: "$[*]"
                - name: count
                  type: integer
                  mapping: "$.length"
            - method: POST
              name: create-alert
              description: "Create an alert"
              call: "snowflake-alert.create-alert"
              inputParameters:
                - name: database
                  type: string
                  description: "Target database name."
                  required: true
                  mapping: "pathParameters.database"
                - name: schema
                  type: string
                  description: "Target schema name."
                  required: true
                  mapping: "pathParameters.schema"
                - name: name
                  type: string
                  description: "Alert name."
                  required: true
                  mapping: "body.name"
                - name: condition
                  type: string
                  description: "SQL condition that triggers the alert."
                  required: true
                  mapping: "body.condition"
                - name: action
                  type: string
                  description: "Action to execute when the condition is met."
                  required: true
                  mapping: "body.action"
              outputParameters:
                - name: name
                  type: string
                  mapping: "$.name"
                - name: state
                  type: string
                  mapping: "$.state"

    - type: mcp
      port: 9084
      namespace: snowflake-compute-mcp
      transport: http
      description: "MCP server (Streaming HTTP) for AI-assisted Snowflake compute and services management."
