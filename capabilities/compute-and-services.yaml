            - name: schema
              type: string
              description: "Target schema name."
              required: true
              mapping: "pathParameters.schema"
            - name: name
              type: string
              description: "Service name."
              required: true
              mapping: "pathParameters.name"
            - name: instance_id
              type: string
              description: "Instance identifier within the service."
              required: false
              mapping: "queryParameters.instanceId"
