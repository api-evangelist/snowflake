openapi: 3.0.0
servers:
- description: Snowflake REST Server
  url: https://org-account.snowflakecomputing.com
info:
  version: 0.0.1
  title: Snowflake User Defined Function API
  description: The Snowflake User Defined Function API is a REST API that you can use to access, update, and perform certain actions on User Defined Function resource in a Snowflake database.
  contact:
    name: Snowflake, Inc.
    url: https://snowflake.com
    email: support@snowflake.com
paths:
  /api/v2/databases/{database}/schemas/{schema}/user-defined-functions:
    post:
      summary: Create a Udf
      tags:
      - user-defined-function
      description: Create a UDF
      operationId: createUserDefinedFunction
      parameters:
      - $ref: common.yaml#/components/parameters/database
      - $ref: common.yaml#/components/parameters/schema
      - $ref: common.yaml#/components/parameters/createMode
      - $ref: common.yaml#/components/parameters/copyGrants
      responses:
        '200':
          $ref: common.yaml#/components/responses/200SuccessResponse
        '202':
          $ref: common.yaml#/components/responses/202SuccessAcceptedResponse
        '400':
          $ref: common.yaml#/components/responses/400BadRequest
        '401':
          $ref: common.yaml#/components/responses/401Unauthorized
        '403':
          $ref: common.yaml#/components/responses/403Forbidden
        '404':
          $ref: common.yaml#/components/responses/404NotFound
        '405':
          $ref: common.yaml#/components/responses/405MethodNotAllowed
        '408':
          $ref: common.yaml#/components/responses/408RequestTimeout
        '409':
          $ref: common.yaml#/components/responses/409Conflict
        '410':
          $ref: common.yaml#/components/responses/410Gone
        '429':
          $ref: common.yaml#/components/responses/429LimitExceeded
        '500':
          $ref: common.yaml#/components/responses/500InternalServerError
        '503':
          $ref: common.yaml#/components/responses/503ServiceUnavailable
        '504':
          $ref: common.yaml#/components/responses/504GatewayTimeout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDefinedFunction'
            examples:
              CreateuserdefinedfunctionRequestExample:
                summary: Default createUserDefinedFunction request
                x-microcks-default: true
                value:
                  name: Example Title
                  is_temporary: true
                  is_aggregate: true
                  is_memoizable: true
                  is_table_function: true
                  valid_for_clustering: true
                  is_secure: true
                  arguments:
                  - name: Example Title
                    datatype: ARRAY
                    default_value: example_value
                  return_type:
                    type: example_value
                  language_config:
                    language: example_value
                    called_on_null_input: true
                    is_volatile: true
                  comment: example_value
                  body: example_value
                  created_on: '2026-01-15T10:30:00Z'
                  schema_name: example_value
                  database_name: example_value
                  min_num_arguments: 10
                  max_num_arguments: 10
                  owner: example_value
                  owner_role_type: example_value
                  is_builtin: true
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      summary: List Udfs
      tags:
      - user-defined-function
      description: List UDFs
      operationId: listUserDefinedFunctions
      parameters:
      - $ref: common.yaml#/components/parameters/database
      - $ref: common.yaml#/components/parameters/schema
      - $ref: common.yaml#/components/parameters/like
      responses:
        '200':
          description: successful
          headers:
            X-Snowflake-Request-ID:
              $ref: common.yaml#/components/headers/X-Snowflake-Request-ID
            Link:
              $ref: common.yaml#/components/headers/Link
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDefinedFunction'
              examples:
                Listuserdefinedfunctions200Example:
                  summary: Default listUserDefinedFunctions 200 response
                  x-microcks-default: true
                  value:
                  - name: Example Title
                    is_temporary: true
                    is_aggregate: true
                    is_memoizable: true
                    is_table_function: true
                    valid_for_clustering: true
                    is_secure: true
                    arguments:
                    - {}
                    return_type:
                      type: example_value
                    language_config:
                      language: example_value
                      called_on_null_input: true
                      is_volatile: true
                    comment: example_value
                    body: example_value
                    created_on: '2026-01-15T10:30:00Z'
                    schema_name: example_value
                    database_name: example_value
                    min_num_arguments: 10
                    max_num_arguments: 10
                    owner: example_value
                    owner_role_type: example_value
                    is_builtin: true
        '202':
          $ref: common.yaml#/components/responses/202SuccessAcceptedResponse
        '400':
          $ref: common.yaml#/components/responses/400BadRequest
        '401':
          $ref: common.yaml#/components/responses/401Unauthorized
        '403':
          $ref: common.yaml#/components/responses/403Forbidden
        '404':
          $ref: common.yaml#/components/responses/404NotFound
        '405':
          $ref: common.yaml#/components/responses/405MethodNotAllowed
        '408':
          $ref: common.yaml#/components/responses/408RequestTimeout
        '409':
          $ref: common.yaml#/components/responses/409Conflict
        '410':
          $ref: common.yaml#/components/responses/410Gone
        '429':
          $ref: common.yaml#/components/responses/429LimitExceeded
        '500':
          $ref: common.yaml#/components/responses/500InternalServerError
        '503':
          $ref: common.yaml#/components/responses/503ServiceUnavailable
        '504':
          $ref: common.yaml#/components/responses/504GatewayTimeout
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /api/v2/databases/{database}/schemas/{schema}/user-defined-functions/{nameWithArgs}:
