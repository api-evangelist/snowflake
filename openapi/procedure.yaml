          - VARIANT
          - VECTOR
          description: Return data type
          example: ARRAY
        nullable:
          type: boolean
          description: Argument null return acceptance criteria
          example: true
      required:
      - datatype
    ReturnTable:
      allOf:
      - $ref: '#/components/schemas/ReturnType'
      properties:
        column_list:
          type: array
          items:
            $ref: '#/components/schemas/ColumnType'
          description: List of table columns to return
          example: []
    ColumnType:
      type: object
      properties:
        name:
          type: string
          pattern: ^"([^"]|"")+"|[a-zA-Z_][a-zA-Z0-9_$]*$
          description: Argument name
          example: Example Title
        datatype:
          type: string
          enum:
          - ARRAY
          - BIGINT
          - BINARY
          - BOOLEAN
          - BYTEINT
          - CHAR
          - CHARACTER
          - DATE
          - DATETIME
          - DECIMAL
          - DOUBLE
          - DOUBLE PRECISION
          - FLOAT
          - FLOAT4
          - FLOAT8
          - GEOGRAPHY
          - GEOMETRY
          - INT
          - INTEGER
          - NUMBER
          - NUMERIC
          - OBJECT
          - REAL
          - STRING
          - SMALLINT
          - TEXT
          - TIME
          - TIMESTAMP_LTZ
          - TIMESTAMP_NTZ
          - TIMESTAMP_TZ
          - TINYINT
          - VARBINARY
          - VARCHAR
          - VARIANT
          - VECTOR
          x-enum-varnames:
