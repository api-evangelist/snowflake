          - TINYINT
          - VARBINARY
          - VARCHAR
          - VARIANT
          - VECTOR
          x-enum-varnames:
          - ARRAY
          - BIGINT
          - BINARY
          - BOOLEAN
          - BYTEINT
          - CHAR
          - CHARACTER
          - DATE
          - DATETIME
          - DECIMAL
          - DOUBLE
          - DOUBLE_PRECISION
          - FLOAT
          - FLOAT4
          - FLOAT8
